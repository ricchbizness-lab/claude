  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #fdf8f3;
    --warm-white: #fff9f4;
    --sand: #f0e8dc;
    --terracotta: #c96a3b;
    --terracotta-light: #e07d4e;
    --terracotta-dark: #a8542d;
    --sage: #7a9e7e;
    --sage-light: #a8c5ab;
    --plum: #4a3550;
    --plum-light: #6b4f7a;
    --text-dark: #1e1714;
    --text-mid: #4a3d35;
    --text-light: #8a7060;
    --border: #e8ddd4;
    --shadow-soft: 0 4px 24px rgba(74, 53, 80, 0.08);
    --shadow-hover: 0 12px 40px rgba(74, 53, 80, 0.16);
    --radius: 20px;
    --radius-sm: 12px;
    --serif: 'Playfair Display', Georgia, serif;
    --sans: 'Inter', system-ui, sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--sans);
    background: var(--cream);
    color: var(--text-dark);
    line-height: 1.6;
    overflow-x: hidden;
  }

  .header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 0 5%;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(253, 248, 243, 0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(232, 221, 212, 0.6);
    transition: box-shadow 0.3s ease;
  }
  .header.scrolled { box-shadow: var(--shadow-soft); }

  .logo {
    font-family: var(--serif);
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--plum);
    text-decoration: none;
    letter-spacing: -0.02em;
  }
  .logo span { color: var(--terracotta); }

  .nav {
    display: flex;
    align-items: center;
    gap: 2rem;
  }
  .nav a {
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--text-mid);
    text-decoration: none;
    transition: color 0.2s;
  }
  .nav a:hover { color: var(--plum); }

  .nav-mobile-hidden { display: flex; gap: 2rem; }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--terracotta);
    color: #fff;
    padding: 0.6rem 1.4rem;
    border-radius: 100px;
    font-size: 0.875rem;
    font-weight: 600;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
  }
  .btn-primary:hover {
    background: var(--terracotta-dark);
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(201, 106, 59, 0.35);
  }

  .btn-secondary {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: transparent;
    color: var(--plum);
    padding: 0.6rem 1.4rem;
    border-radius: 100px;
    font-size: 0.875rem;
    font-weight: 600;
    text-decoration: none;
    border: 2px solid var(--plum);
    cursor: pointer;
    transition: background 0.2s, color 0.2s, transform 0.15s;
  }
  .btn-secondary:hover {
    background: var(--plum);
    color: #fff;
    transform: translateY(-1px);
  }

  /* Hero scroll-zoom rig: a tall scroll track that pins a sticky stage inside it.
     As the user scrolls through the track, JS computes a 0→1 progress value
     and applies it as inline transforms (scale/opacity/translate) on the
     phone visual and the text block — this is what makes the zoom continuous
     and tied to scroll position, rather than a one-shot reveal animation. */
  .hero-track {
    position: relative;
    height: 220vh;
  }
  .hero {
    position: sticky;
    top: 0;
    height: 100vh;
    padding: 120px 5% 80px;
    display: flex;
    align-items: center;
    background: linear-gradient(160deg, var(--warm-white) 0%, var(--sand) 60%, #ecddd0 100%);
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -20%;
    right: -10%;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,106,59,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero::after {
    content: '';
    position: absolute;
    bottom: -10%;
    left: -5%;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(122,158,126,0.1) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-inner {
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4rem;
    align-items: center;
    will-change: transform, opacity;
  }

  /* The zoom stage wraps the phone; its transform is driven entirely by
     inline style set from scroll progress in the component below. */
  .zoom-stage {
    will-change: transform;
    transform-origin: center center;
  }

  /* Fades the hero content out as the next section's scrim rises over it,
     giving the "closer, closer, until—" sensation from the reference video. */
  .hero-scrim {
    position: absolute;
    inset: 0;
    background: var(--plum);
    opacity: 0;
    pointer-events: none;
    z-index: 5;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    background: rgba(122, 158, 126, 0.15);
    color: #4d7a52;
    padding: 0.35rem 1rem;
    border-radius: 100px;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }
  .hero-badge::before { content: '✦'; font-size: 0.6rem; }

  .hero-title {
    font-family: var(--serif);
    font-size: clamp(2.6rem, 5vw, 4rem);
    font-weight: 700;
    line-height: 1.1;
    color: var(--text-dark);
    letter-spacing: -0.02em;
    margin-bottom: 1.5rem;
  }
  .hero-title em {
    font-style: normal;
    color: var(--terracotta);
    position: relative;
  }
  .hero-title em::after {
    content: '';
    position: absolute;
    bottom: 2px; left: 0; right: 0;
    height: 3px;
    background: var(--terracotta);
    opacity: 0.3;
    border-radius: 2px;
  }

  .hero-subtitle {
    font-size: 1.1rem;
    color: var(--text-mid);
    line-height: 1.7;
    max-width: 440px;
    margin-bottom: 2.5rem;
  }

  .hero-ctas {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    align-items: center;
  }

  .hero-visual {
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
  }

  .phone-mockup {
    width: 260px;
    height: 520px;
    background: var(--plum);
    border-radius: 36px;
    padding: 14px;
    box-shadow: 0 30px 80px rgba(74, 53, 80, 0.35), 0 0 0 1px rgba(255,255,255,0.1);
    position: relative;
    transform: rotate(2deg);
    transition: transform 0.4s ease;
  }
  .phone-mockup:hover { transform: rotate(0deg) scale(1.02); }

  .phone-notch {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    height: 24px;
    background: var(--plum);
    border-radius: 0 0 14px 14px;
    z-index: 2;
  }

  .phone-screen {
    width: 100%;
    height: 100%;
    background: linear-gradient(160deg, #fdf5ee 0%, #f5e6d8 100%);
    border-radius: 24px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .phone-status-bar {
    padding: 12px 16px 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.6rem;
    font-weight: 600;
    color: var(--text-mid);
  }

  .phone-app-header {
    padding: 8px 16px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .phone-app-title {
    font-family: var(--serif);
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--plum);
  }
  .phone-avatar-row {
    display: flex;
    gap: 4px;
  }
  .phone-avatar {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid white;
  }

  .phone-ai-card {
    margin: 0 12px 10px;
    background: linear-gradient(135deg, var(--plum) 0%, var(--plum-light) 100%);
    border-radius: 14px;
    padding: 12px;
    color: white;
  }
  .phone-ai-label {
    font-size: 0.55rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0.7;
    margin-bottom: 4px;
  }
  .phone-ai-msg {
    font-size: 0.65rem;
    line-height: 1.4;
    opacity: 0.95;
  }

  .phone-tasks {
    padding: 0 12px;
    flex: 1;
  }
  .phone-tasks-label {
    font-size: 0.6rem;
    font-weight: 600;
    color: var(--text-light);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .phone-task-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    background: white;
    border-radius: 10px;
    margin-bottom: 6px;
    box-shadow: 0 1px 6px rgba(74,53,80,0.06);
  }
  .phone-task-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .phone-task-text {
    font-size: 0.6rem;
    color: var(--text-mid);
    flex: 1;
  }
  .phone-task-tag {
    font-size: 0.5rem;
    padding: 2px 6px;
    border-radius: 100px;
    font-weight: 600;
  }

  .phone-float-card {
    position: absolute;
    background: white;
    border-radius: 14px;
    padding: 10px 14px;
    box-shadow: var(--shadow-hover);
    font-size: 0.7rem;
  }
  .phone-float-card.left {
    left: -60px;
    top: 30%;
    transform: rotate(-4deg);
  }
  .phone-float-card.right {
    right: -50px;
    bottom: 25%;
    transform: rotate(3deg);
  }
  .float-emoji { font-size: 1rem; display: block; margin-bottom: 2px; }
  .float-label { font-size: 0.6rem; color: var(--text-light); }
  .float-value { font-size: 0.75rem; font-weight: 700; color: var(--text-dark); }

  .section {
    padding: 100px 5%;
  }
  .section-inner {
    max-width: 1100px;
    margin: 0 auto;
  }
  .section-tag {
    display: inline-block;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--terracotta);
    margin-bottom: 1rem;
  }
  .section-title {
    font-family: var(--serif);
    font-size: clamp(1.8rem, 3.5vw, 2.8rem);
    font-weight: 700;
    line-height: 1.15;
    color: var(--text-dark);
    letter-spacing: -0.02em;
    margin-bottom: 1.2rem;
  }
  .section-subtitle {
    font-size: 1.05rem;
    color: var(--text-mid);
    max-width: 540px;
    line-height: 1.7;
  }

  .reveal {
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 0.65s ease, transform 0.65s ease;
  }
  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .reveal-delay-1 { transition-delay: 0.1s; }
  .reveal-delay-2 { transition-delay: 0.2s; }
  .reveal-delay-3 { transition-delay: 0.3s; }
  .reveal-delay-4 { transition-delay: 0.4s; }
  .reveal-delay-5 { transition-delay: 0.5s; }

  .problem-section {
    background: var(--plum);
    color: white;
  }
  .problem-lines {
    max-width: 760px;
    margin: 0 auto;
    padding: 0 5%;
  }
  .problem-line {
    font-family: var(--serif);
    font-size: clamp(1.6rem, 3.5vw, 2.6rem);
    font-weight: 400;
    line-height: 1.3;
    margin-bottom: 0.5rem;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.6s ease, transform 0.6s ease;
    color: rgba(255,255,255,0.5);
  }
  .problem-line.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .problem-line.accent {
    font-weight: 700;
    color: white;
  }
  .problem-line.emphasis {
    color: var(--terracotta-light);
    font-style: italic;
  }
  .problem-line.final {
    color: var(--sage-light);
    font-size: clamp(1.1rem, 2.5vw, 1.4rem);
    font-family: var(--sans);
    font-weight: 400;
    margin-top: 2rem;
    font-style: normal;
  }

  .features-section { background: var(--warm-white); }

  .features-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5rem;
    margin-top: 3.5rem;
  }

  .feature-card {
    background: white;
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow-soft);
    cursor: default;
    transition: box-shadow 0.35s ease, transform 0.35s ease;
    border: 1px solid var(--border);
  }
  .feature-card:hover {
    box-shadow: var(--shadow-hover);
    transform: translateY(-4px);
  }

  .feature-card-image {
    overflow: hidden;
    height: 190px;
    position: relative;
  }
  .feature-card-image-inner {
    width: 100%;
    height: 100%;
    transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  .feature-card:hover .feature-card-image-inner {
    transform: scale(1.07);
  }

  .feature-card-body {
    padding: 1.25rem 1.4rem 1.4rem;
  }
  .feature-icon {
    font-size: 1.3rem;
    margin-bottom: 0.6rem;
    display: block;
  }
  .feature-title {
    font-family: var(--serif);
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--text-dark);
    margin-bottom: 0.4rem;
    transition: color 0.25s;
  }
  .feature-card:hover .feature-title { color: var(--terracotta); }
  .feature-desc {
    font-size: 0.85rem;
    color: var(--text-light);
    line-height: 1.6;
  }

  .feat-mock {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 16px;
    gap: 8px;
  }
  .feat-mock-title {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .feat-mock-row {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.6);
    border-radius: 8px;
    padding: 6px 10px;
  }
  .feat-mock-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .feat-mock-text { font-size: 0.6rem; flex: 1; }
  .feat-mock-assign {
    font-size: 0.5rem;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 100px;
  }

  .feat-mock-bar {
    height: 6px;
    border-radius: 100px;
    margin-top: 2px;
  }
  .feat-mock-bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.55rem;
    margin-bottom: 3px;
  }

  .feat-mock-chat {
    background: rgba(255,255,255,0.75);
    border-radius: 10px;
    padding: 8px 10px;
    font-size: 0.6rem;
    line-height: 1.4;
  }
  .chat-bubble {
    padding: 6px 10px;
    border-radius: 10px;
    font-size: 0.6rem;
    margin-bottom: 4px;
    max-width: 85%;
    line-height: 1.35;
  }
  .chat-bubble.ai { background: var(--plum); color: white; border-radius: 10px 10px 10px 2px; }
  .chat-bubble.user { background: white; color: var(--text-dark); margin-left: auto; border-radius: 10px 10px 2px 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }

  .feat-mock-reward {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.7);
    border-radius: 10px;
    padding: 7px 10px;
  }
  .reward-badge {
    font-size: 1.1rem;
  }
  .reward-info { font-size: 0.6rem; }
  .reward-name { font-weight: 700; color: var(--text-dark); }
  .reward-stars { color: #f5a623; font-size: 0.55rem; }

  .how-section { background: var(--cream); }
  .steps-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2rem;
    margin-top: 3.5rem;
    position: relative;
  }
  .steps-grid::before {
    content: '';
    position: absolute;
    top: 48px;
    left: calc(16.66% + 20px);
    right: calc(16.66% + 20px);
    height: 2px;
    background: linear-gradient(90deg, var(--terracotta), var(--sage));
    opacity: 0.3;
  }

  .step-card {
    text-align: center;
    padding: 2rem 1.5rem;
    position: relative;
  }
  .step-number {
    font-family: var(--serif);
    font-size: 2.8rem;
    font-weight: 700;
    color: var(--border);
    line-height: 1;
    margin-bottom: 1rem;
    position: relative;
    display: inline-block;
  }

  .step-icon-wrap {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.25rem;
    font-size: 1.8rem;
    position: relative;
  }

  .step-title {
    font-family: var(--serif);
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--text-dark);
    margin-bottom: 0.6rem;
  }
  .step-desc {
    font-size: 0.9rem;
    color: var(--text-light);
    line-height: 1.65;
  }

  .reassurance-section { background: var(--sand); }
  .pillars-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1.5rem;
    margin-top: 3rem;
  }
  .pillar-card {
    background: white;
    border-radius: var(--radius);
    padding: 1.75rem 1.5rem;
    box-shadow: var(--shadow-soft);
    border: 1px solid rgba(255,255,255,0.8);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }
  .pillar-card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-hover);
  }
  .pillar-icon {
    font-size: 1.6rem;
    margin-bottom: 0.9rem;
    display: block;
  }
  .pillar-title {
    font-family: var(--serif);
    font-size: 1rem;
    font-weight: 700;
    color: var(--text-dark);
    margin-bottom: 0.5rem;
  }
  .pillar-desc {
    font-size: 0.825rem;
    color: var(--text-light);
    line-height: 1.6;
  }

  .testimonials-section { background: var(--warm-white); }
  .testimonials-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5rem;
    margin-top: 3rem;
  }
  .testimonial-card {
    background: white;
    border-radius: var(--radius);
    padding: 2rem;
    box-shadow: var(--shadow-soft);
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
    transition: transform 0.3s ease;
  }
  .testimonial-card:hover { transform: translateY(-3px); }
  .testimonial-stars {
    color: #f5a623;
    font-size: 0.9rem;
    letter-spacing: 2px;
  }
  .testimonial-quote {
    font-size: 0.95rem;
    line-height: 1.7;
    color: var(--text-mid);
    font-style: italic;
    flex: 1;
  }
  .testimonial-author {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .testimonial-avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
  }
  .testimonial-name {
    font-weight: 600;
    font-size: 0.875rem;
    color: var(--text-dark);
  }
  .testimonial-role {
    font-size: 0.775rem;
    color: var(--text-light);
  }

  .faq-section { background: var(--cream); }
  .faq-list {
    max-width: 720px;
    margin: 3rem auto 0;
  }
  .faq-item {
    border-bottom: 1px solid var(--border);
    overflow: hidden;
  }
  .faq-question {
    width: 100%;
    background: none;
    border: none;
    cursor: pointer;
    padding: 1.4rem 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    text-align: left;
    font-family: var(--sans);
    font-size: 1rem;
    font-weight: 600;
    color: var(--text-dark);
    transition: color 0.2s;
  }
  .faq-question:hover { color: var(--terracotta); }
  .faq-chevron {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--sand);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.3s ease, background 0.2s;
    font-size: 0.7rem;
    color: var(--plum);
  }
  .faq-chevron.open {
    transform: rotate(180deg);
    background: var(--terracotta);
    color: white;
  }
  .faq-answer {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease, padding 0.3s ease;
  }
  .faq-answer.open {
    max-height: 300px;
    padding-bottom: 1.4rem;
  }
  .faq-answer-text {
    font-size: 0.9rem;
    color: var(--text-mid);
    line-height: 1.75;
  }

  .cta-final {
    background: linear-gradient(135deg, var(--plum) 0%, #2e1f3a 100%);
    padding: 120px 5%;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .cta-final::before {
    content: '';
    position: absolute;
    top: -30%;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,106,59,0.2) 0%, transparent 70%);
    pointer-events: none;
  }
  .cta-final-tag {
    display: inline-block;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--sage-light);
    margin-bottom: 1.25rem;
  }
  .cta-final-title {
    font-family: var(--serif);
    font-size: clamp(2rem, 4vw, 3.2rem);
    font-weight: 700;
    color: white;
    line-height: 1.15;
    letter-spacing: -0.02em;
    margin-bottom: 1.25rem;
    max-width: 640px;
    margin-left: auto;
    margin-right: auto;
  }
  .cta-final-sub {
    font-size: 1rem;
    color: rgba(255,255,255,0.65);
    margin-bottom: 2.5rem;
    max-width: 440px;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.7;
  }
  .cta-final .btn-primary {
    font-size: 1rem;
    padding: 0.85rem 2rem;
    background: var(--terracotta);
    box-shadow: 0 8px 32px rgba(201, 106, 59, 0.4);
  }
  .cta-final .btn-primary:hover {
    background: var(--terracotta-light);
    box-shadow: 0 12px 40px rgba(201, 106, 59, 0.55);
  }
  .cta-note {
    margin-top: 1.25rem;
    font-size: 0.8rem;
    color: rgba(255,255,255,0.4);
  }

  .footer {
    background: var(--text-dark);
    padding: 3rem 5%;
    color: rgba(255,255,255,0.5);
  }
  .footer-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 2rem;
    flex-wrap: wrap;
  }
  .footer-logo {
    font-family: var(--serif);
    font-size: 1.1rem;
    font-weight: 600;
    color: white;
  }
  .footer-logo span { color: var(--terracotta-light); }
  .footer-links {
    display: flex;
    gap: 1.75rem;
    flex-wrap: wrap;
  }
  .footer-links a {
    font-size: 0.825rem;
    color: rgba(255,255,255,0.45);
    text-decoration: none;
    transition: color 0.2s;
  }
  .footer-links a:hover { color: white; }
  .footer-copy { font-size: 0.8rem; }

  @media (max-width: 900px) {
    .hero-inner {
      grid-template-columns: 1fr;
      text-align: center;
    }
    .hero-visual { order: -1; }
    .hero-subtitle { margin: 0 auto 2.5rem; }
    .hero-ctas { justify-content: center; }
    .phone-float-card { display: none; }
    .features-grid { grid-template-columns: repeat(2, 1fr); }
    .steps-grid { grid-template-columns: 1fr; }
    .steps-grid::before { display: none; }
    .pillars-grid { grid-template-columns: repeat(2, 1fr); }
    .testimonials-grid { grid-template-columns: 1fr; }
    .nav-mobile-hidden { display: none; }
  }

  @media (max-width: 600px) {
    .features-grid { grid-template-columns: 1fr; }
    .pillars-grid { grid-template-columns: 1fr; }
    .hero { padding: 100px 5% 60px; }
    .section { padding: 70px 5%; }
